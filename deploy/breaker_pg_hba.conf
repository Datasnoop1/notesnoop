# R18 Tier-2 emergency pg_hba.conf
#
# Replaces the live pg_hba.conf when the Tier-2 breaker trips at >185 GB
# volume usage. Allows ONLY:
#   - local postgres / backup_user (so operator + backup script can recover)
#   - host postgres / backup_user via 127.0.0.1 with password
#   - replication: NONE (we don't run any replication)
# Everything else is rejected.
#
# Recovery: cp pg_hba.conf.normal back; systemctl reload postgresql@16-main.

# TYPE  DATABASE        USER             ADDRESS            METHOD

local   all             postgres                            peer
local   all             backup_user                         peer

host    all             postgres         127.0.0.1/32       scram-sha-256
host    all             backup_user      127.0.0.1/32       scram-sha-256
host    all             postgres         ::1/128            scram-sha-256
host    all             backup_user      ::1/128            scram-sha-256

# Reject everything else with a clear message
local   all             all                                 reject
host    all             all              0.0.0.0/0          reject
host    all             all              ::/0               reject
