<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110">
  <defs>
    <linearGradient id="da1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="da2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Magnifying glass — behind the dog -->
  <line x1="68" y1="76" x2="84" y2="94" stroke="#b0b8c4" stroke-width="7" stroke-linecap="round"/>
  <circle cx="52" cy="60" r="26" fill="#f8fafc" stroke="#78869b" stroke-width="4"/>
  <path d="M39 50 Q43 44 50 47" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Dog head — single clean path outline -->
  <!-- Silhouette: round head, left floppy ear drooping down, right ear perked up slightly -->
  <path d="
    M 22 50
    Q 14 42 12 30
    Q 10 18 18 16
    Q 22 15 24 22
    Q 26 28 28 30
    Q 32 14 40 8
    Q 48 3 56 8
    Q 60 10 62 16
    Q 66 14 70 18
    Q 74 22 72 30
    Q 70 36 66 38
    Q 72 42 72 50
    Q 72 58 64 62
    Q 56 66 46 66
    Q 34 66 26 60
    Q 22 56 22 50
    Z
  " fill="url(#da1)"/>

  <!-- Inner ear shading — left ear (floppy) -->
  <path d="
    M 18 18
    Q 20 17 22 22
    Q 24 28 26 30
    Q 24 28 20 26
    Q 16 24 16 20
    Z
  " fill="#d97706" opacity="0.6"/>

  <!-- Inner ear shading — right ear -->
  <path d="
    M 66 18
    Q 70 20 70 26
    Q 70 32 66 36
    Q 68 28 66 22
    Z
  " fill="#d97706" opacity="0.6"/>

  <!-- Muzzle area — lighter -->
  <ellipse cx="50" cy="48" rx="14" ry="10" fill="#fcd34d" opacity="0.85"/>

  <!-- Nose — solid and clear -->
  <ellipse cx="50" cy="42" rx="5" ry="3.8" fill="#292524"/>
  <ellipse cx="48.5" cy="41" rx="1.8" ry="1" fill="white" opacity="0.25"/>

  <!-- Left eye — open -->
  <circle cx="36" cy="30" r="5.5" fill="white"/>
  <circle cx="38" cy="30.5" r="3.5" fill="#292524"/>
  <circle cx="39.2" cy="29.5" r="1.4" fill="white"/>

  <!-- Right eye — winking -->
  <path d="M54 30 Q58 26 62 30" fill="none" stroke="#292524" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Mouth — subtle smirk -->
  <path d="M44 52 Q50 56 56 52" fill="none" stroke="#92400e" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="104" y="52" font-family="'Baloo 2', 'Nunito', 'Segoe UI', sans-serif" font-size="44" font-weight="800" letter-spacing="-0.5" fill="#1e293b">
    data<tspan fill="url(#da2)">snoop</tspan>
  </text>
  <text x="106" y="74" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12.5" font-weight="500" letter-spacing="2.5" fill="#94a3b8">
    COMPANY INTELLIGENCE
  </text>
</svg>