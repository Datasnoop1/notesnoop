<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dog with detective hat holding magnifying glass down — investigating -->
  <!-- Hat -->
  <ellipse cx="36" cy="16" rx="26" ry="5" fill="#1e293b"/>
  <path d="M14 16 Q18 2 36 0 Q54 2 58 16 Z" fill="#1e293b"/>

  <!-- Dog head -->
  <circle cx="36" cy="38" r="22" fill="#1e293b"/>
  <!-- Ears peeking from under hat -->
  <ellipse cx="14" cy="30" rx="8" ry="12" fill="#1e293b" transform="rotate(-8 14 30)"/>
  <ellipse cx="58" cy="28" rx="7" ry="11" fill="#1e293b" transform="rotate(10 58 28)"/>

  <!-- Eyes -->
  <circle cx="28" cy="34" r="4" fill="white"/>
  <circle cx="44" cy="34" r="4" fill="white"/>
  <circle cx="29.5" cy="34.5" r="2" fill="#1e293b"/>
  <circle cx="45.5" cy="34.5" r="2" fill="#1e293b"/>

  <!-- Nose -->
  <ellipse cx="36" cy="42" rx="3.5" ry="2.5" fill="white"/>

  <!-- Mouth -->
  <path d="M30 48 Q36 52 42 48" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

  <!-- Magnifying glass held low — investigating the ground -->
  <circle cx="62" cy="62" r="12" fill="none" stroke="#1e293b" stroke-width="4"/>
  <line x1="54" y1="54" x2="48" y2="48" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
</svg>