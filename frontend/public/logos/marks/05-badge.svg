<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dog head centered inside magnifying glass lens — badge style -->
  <!-- Glass rim -->
  <circle cx="38" cy="36" r="30" fill="#1e293b"/>
  <circle cx="38" cy="36" r="26" fill="white"/>
  <!-- Handle -->
  <line x1="58" y1="58" x2="74" y2="76" stroke="#1e293b" stroke-width="7" stroke-linecap="round"/>

  <!-- Dog head inside the lens — dark silhouette on white -->
  <circle cx="38" cy="34" r="16" fill="#1e293b"/>
  <!-- Ears -->
  <ellipse cx="24" cy="26" rx="6" ry="10" fill="#1e293b" transform="rotate(-10 24 26)"/>
  <ellipse cx="52" cy="26" rx="6" ry="10" fill="#1e293b" transform="rotate(10 52 26)"/>

  <!-- Eyes -->
  <circle cx="32" cy="30" r="3" fill="white"/>
  <circle cx="44" cy="30" r="3" fill="white"/>
  <circle cx="33" cy="30.5" r="1.5" fill="#1e293b"/>
  <circle cx="45" cy="30.5" r="1.5" fill="#1e293b"/>

  <!-- Nose -->
  <ellipse cx="38" cy="36" rx="2.5" ry="1.8" fill="white"/>

  <!-- Mouth -->
  <path d="M34 40 Q38 44 42 40" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
</svg>