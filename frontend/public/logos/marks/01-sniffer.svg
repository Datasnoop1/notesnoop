<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dog in profile sniffing through magnifying glass — clean silhouette -->
  <!-- Magnifying glass -->
  <circle cx="54" cy="44" r="22" fill="none" stroke="#1e293b" stroke-width="5"/>
  <line x1="70" y1="60" x2="78" y2="70" stroke="#1e293b" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Dog head silhouette — profile facing right, snout enters the lens -->
  <path d="
    M6 28 Q4 16 10 10 Q14 6 18 12 Q20 16 20 20
    Q22 10 30 8 Q36 6 38 14
    Q40 10 42 14 Q44 10 46 12 Q48 16 46 22
    Q48 26 44 30
    Q50 30 54 28 Q56 30 56 34
    Q56 38 52 38
    Q48 42 42 42
    Q36 44 30 46
    Q24 48 20 52 Q16 54 12 52
    Q6 48 6 40 Z
  " fill="#1e293b"/>

  <!-- Eye cutout — white -->
  <circle cx="28" cy="24" r="4" fill="white"/>
  <circle cx="30" cy="24" r="2" fill="#1e293b"/>

  <!-- Nose highlight -->
  <ellipse cx="52" cy="34" rx="3.5" ry="2.5" fill="#1e293b"/>

  <!-- Ear accent line -->
  <path d="M14 14 Q16 10 18 14" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>