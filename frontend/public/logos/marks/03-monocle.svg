<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dog face with one eye AS the magnifying glass lens — clever integration -->
  <!-- Dog head -->
  <circle cx="40" cy="38" r="28" fill="#1e293b"/>

  <!-- Floppy ears -->
  <ellipse cx="14" cy="30" rx="10" ry="16" fill="#1e293b" transform="rotate(-12 14 30)"/>
  <ellipse cx="66" cy="30" rx="10" ry="16" fill="#1e293b" transform="rotate(12 66 30)"/>

  <!-- Muzzle — lighter shape cutout -->
  <ellipse cx="40" cy="46" rx="14" ry="10" fill="white" opacity="0.15"/>

  <!-- Left eye — normal, white cutout -->
  <circle cx="30" cy="34" r="5" fill="white"/>
  <circle cx="32" cy="34.5" r="2.5" fill="#1e293b"/>

  <!-- Right eye IS the magnifying glass -->
  <circle cx="52" cy="32" r="8" fill="white"/>
  <circle cx="52" cy="32" r="8" stroke="#1e293b" stroke-width="3" fill="none"/>
  <circle cx="54" cy="32.5" r="3.5" fill="#1e293b"/>
  <!-- Glass handle -->
  <line x1="58" y1="38" x2="68" y2="50" stroke="#1e293b" stroke-width="4" stroke-linecap="round"/>
  <!-- Lens shine -->
  <path d="M47 28 Q49 26 51 28" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="40" cy="44" rx="4" ry="3" fill="white"/>

  <!-- Mouth -->
  <path d="M36 50 Q40 54 44 50" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>