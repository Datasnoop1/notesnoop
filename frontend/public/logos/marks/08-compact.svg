<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Compact: large dog head, small magnifying glass tucked bottom-right -->

  <!-- Magnifying glass — small, behind dog -->
  <circle cx="58" cy="58" r="16" fill="#1e293b"/>
  <circle cx="58" cy="58" r="12" fill="white"/>
  <line x1="69" y1="69" x2="77" y2="77" stroke="#1e293b" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Dog head — dominant, centered -->
  <circle cx="34" cy="34" r="28" fill="#1e293b"/>
  <!-- Ears -->
  <ellipse cx="10" cy="18" rx="9" ry="16" fill="#1e293b" transform="rotate(-10 10 18)"/>
  <ellipse cx="56" cy="14" rx="8" ry="14" fill="#1e293b" transform="rotate(12 56 14)"/>

  <!-- Eyes -->
  <circle cx="24" cy="30" r="5" fill="white"/>
  <circle cx="42" cy="28" r="5" fill="white"/>
  <circle cx="26" cy="30.5" r="2.5" fill="#1e293b"/>
  <circle cx="44" cy="28.5" r="2.5" fill="#1e293b"/>

  <!-- Nose -->
  <ellipse cx="34" cy="38" rx="4" ry="2.8" fill="white"/>

  <!-- Smile -->
  <path d="M28 44 Q34 48 40 44" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>