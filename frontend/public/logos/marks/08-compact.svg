<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dog looking through magnifying glass — one eye magnified inside the lens -->

  <!-- Dog head — left side -->
  <circle cx="30" cy="36" r="28" fill="#1e293b"/>
  <!-- Floppy ears -->
  <ellipse cx="6" cy="20" rx="9" ry="16" fill="#1e293b" transform="rotate(-10 6 20)"/>
  <ellipse cx="52" cy="16" rx="8" ry="14" fill="#1e293b" transform="rotate(12 52 16)"/>

  <!-- Left eye — normal, smaller -->
  <circle cx="20" cy="32" r="4.5" fill="white"/>
  <circle cx="22" cy="32.5" r="2.2" fill="#1e293b"/>

  <!-- Magnifying glass — positioned over right eye area -->
  <circle cx="52" cy="40" r="20" fill="#1e293b"/>
  <circle cx="52" cy="40" r="16" fill="white"/>
  <line x1="66" y1="54" x2="76" y2="66" stroke="#1e293b" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Right eye — BIG, magnified inside the lens -->
  <circle cx="52" cy="38" r="9" fill="white"/>
  <circle cx="54" cy="38.5" r="5.5" fill="#1e293b"/>
  <circle cx="56" cy="37" r="2.2" fill="white"/>

  <!-- Nose -->
  <ellipse cx="34" cy="44" rx="4" ry="2.8" fill="white"/>

  <!-- Smile -->
  <path d="M28 50 Q34 54 40 50" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>