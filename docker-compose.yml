services:
  backend:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      # See enrichment-worker for explanation. Backend on-profile retry
      # endpoints (/api/companies/.../enrichment) hit the same service.
      PLAYWRIGHT_SCRAPER_URL: "http://playwright-scraper:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    # Mount the repo's scripts/ dir read-only so cron jobs run via
    # `docker exec leadpeek-backend-1 python /app/scripts/<name>.py`
    # pick up the latest version after `git pull` without a rebuild.
    volumes:
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Bumped from 1g because EasyOCR + PyTorch + nl/fr language models
    # consume ~2 GB when loaded. Staatsblad backfill and biweekly
    # incremental OCR run from inside this container.
    mem_limit: 3g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    env_file: .env.production
    restart: always
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Long-running bulk-enrichment worker. Shares the backend image so the
  # dependency set and imports stay identical. Runs `enrichment_worker.main`
  # instead of uvicorn; the Postgres-backed queue means horizontal scaling
  # is one-flag-away (`docker compose up -d --scale enrichment-worker=N`).
  enrichment-worker:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      # I/O-bound workload: discovery, scraping and LLM calls mostly wait on
      # network. A higher in-process concurrency helps use the VPS better
      # without requiring full CPU saturation.
      # Bumped 1 → 3 then → 6 on 2026-04-25. Worker is I/O-bound and
      # was still at 6% CPU / 105 MB RAM at concurrency=3 — vast headroom
      # on the 4 vCPU / 8 GB host. Per-job time is ~19 s (LLM round-trips
      # dominate), so 6 in-flight gives ~1.7× the throughput of 3.
      WORKER_CONCURRENCY: "6"
      WORKER_POLL_INTERVAL_S: "1"
      WORKER_IDLE_SLEEP_S: "15"
      ENRICHMENT_DAILY_BUDGET_USD: "10"
      # Loosened 20s → 12s on 2026-04-25 alongside the concurrency bump.
      # DDG remains a per-host rate limit until the Webshare-DDG rewrite
      # lifts the per-IP cap.
      DDG_MIN_INTERVAL_S: "12"
      DDG_MAX_INTERVAL_S: "90"
      DDG_RATELIMIT_COOLDOWN_S: "180"
      DDG_RATELIMIT_MULTIPLIER: "2.0"
      DDG_RECOVERY_STEP_S: "1.0"
      DDG_SUCCESS_STREAK_TO_RECOVER: "8"
      BULK_Q2_MODEL: "ollama:qwen3-coder-next"
      BULK_Q2_FALLBACK_MODEL: ""
      # Switched 2026-04-25 from anthropic/claude-haiku-4.5 to
      # ollama:kimi-k2.6 so escalations don't share Anthropic rate limits.
      # Anthropic Haiku stays as the fallback for Ollama Cloud outages.
      BULK_HAIKU_MODEL: "ollama:kimi-k2.6"
      BULK_HAIKU_FALLBACK_MODEL: "anthropic/claude-haiku-4.5"
      # Pointer to the in-network playwright-scraper service (Webshare proxy
      # rotation behind a headless Chromium). Set empty to disable the proxy
      # fallback entirely and force template-path on every blocked site.
      PLAYWRIGHT_SCRAPER_URL: "http://playwright-scraper:8000"
      # Wave 2 acceleration (2026-04-25): route DDG through the same
      # Webshare datacenter proxy pool the staatsblad worker already uses.
      # Each call rotates to a different IP so DDG's per-IP rate-limit no
      # longer caps total throughput at this host. With 100 proxies the
      # effective ceiling is ~1k-5k DDG calls/hr (vs ~180/hr direct).
      DDG_VIA_WEBSHARE: "true"
      DDG_VIA_WEBSHARE_MIN_INTERVAL_S: "0.5"
      WEBSHARE_PROXIES_FILE: "/run/secrets/webshare_proxies.txt"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Same proxy file the staatsblad-bulk-worker mounts. Read-only.
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
    depends_on:
      backend:
        condition: service_healthy
      playwright-scraper:
        condition: service_healthy
    command: ["python", "-m", "enrichment_worker"]
    # Worker doesn't serve HTTP — healthcheck confirms the process is
    # alive via a Python one-liner that imports the module.
    healthcheck:
      test: ["CMD", "python", "-c", "import enrichment_worker"]
      interval: 60s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Dedicated long-running Staatsblad bulk scraper. Keeping it separate
  # from the backend service means app deploys/recreates no longer kill
  # the in-flight queue drain. Queue state lives in Postgres, while the
  # Webshare proxy file and logs are mounted from the host so they survive
  # container replacement too.
  staatsblad-bulk-worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      PYTHONPATH: "/app"
      BULK_MAX_PAGES: "${BULK_MAX_PAGES:-5}"
      STAATSBLAD_BULK_WORKERS: "${STAATSBLAD_BULK_WORKERS:-10}"
      STAATSBLAD_BULK_PROXY_FILE: "/run/secrets/webshare_proxies.txt"
      STAATSBLAD_BULK_LOG_FILE: "/var/log/staatsblad_bulk/worker.log"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    command:
      - sh
      - -lc
      - >
        mkdir -p /var/log/staatsblad_bulk &&
        exec python -u /app/scripts/staatsblad_bulk_scrape.py
        --mode=webshare
        --daemon
        --workers=$${STAATSBLAD_BULK_WORKERS:-10}
        --webshare-proxies-file=$${STAATSBLAD_BULK_PROXY_FILE:-/run/secrets/webshare_proxies.txt}
        >> $${STAATSBLAD_BULK_LOG_FILE:-/var/log/staatsblad_bulk/worker.log} 2>&1
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src:/app/src:ro
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
      - ${STAATSBLAD_BULK_LOG_DIR:-/var/log/staatsblad_bulk}:/var/log/staatsblad_bulk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport pathlib\nneedle = 'staatsblad_bulk_scrape.py'\nfor cmdline in pathlib.Path('/proc').glob('*/cmdline'):\n    try:\n        text = cmdline.read_text(errors='ignore').replace('\\x00', ' ')\n    except OSError:\n        continue\n    if needle in text:\n        raise SystemExit(0)\nraise SystemExit(1)\nPY",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Playwright + Webshare proxy scraper. Replaces the bulk Zenrows fallback
  # path that was disabled on 2026-04-25. Backend and enrichment-worker call
  # this service over the docker network at http://playwright-scraper:8000
  # whenever raw httpx + trafilatura comes back empty. The proxy file is
  # the same one the staatsblad bulk worker uses (single source of truth on
  # the host at /root/webshare_proxies.txt). Single uvicorn worker is
  # intentional — Chromium concurrency is capped inside the app.
  playwright-scraper:
    build: ./playwright-scraper
    restart: always
    expose:
      - "8000"
    environment:
      WEBSHARE_PROXIES_FILE: "/run/secrets/webshare_proxies.txt"
      PLAYWRIGHT_MAX_CONCURRENT: "${PLAYWRIGHT_MAX_CONCURRENT:-3}"
      PLAYWRIGHT_DEFAULT_TIMEOUT_MS: "${PLAYWRIGHT_DEFAULT_TIMEOUT_MS:-30000}"
      PLAYWRIGHT_RECYCLE_AFTER: "${PLAYWRIGHT_RECYCLE_AFTER:-500}"
    volumes:
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health'); d=json.load(r); exit(0 if d.get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Chromium + 3 concurrent contexts can spike to ~1 GB. 1.5 GB cap
    # gives breathing room without starving the rest of the stack on
    # the 8 GB Hetzner box.
    mem_limit: 1500m
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 512M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DEMO_BOX_PATH:-/srv/demo-box}:/var/www/demo-box:ro
      # experimental-tools repo, cloned to /srv/tools on the host. Each file is
      # served directly by nginx via a `location` block in default.conf.
      - ${TOOLS_PATH:-/srv/tools}:/var/www/tools:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
