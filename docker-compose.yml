services:
  backend:
    build: ./backend
    restart: always
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    # Mount the repo's scripts/ dir read-only so cron jobs run via
    # `docker exec leadpeek-backend-1 python /app/scripts/<name>.py`
    # pick up the latest version after `git pull` without a rebuild.
    volumes:
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Bumped from 1g because EasyOCR + PyTorch + nl/fr language models
    # consume ~2 GB when loaded. Staatsblad backfill and biweekly
    # incremental OCR run from inside this container.
    mem_limit: 3g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    env_file: .env.production
    restart: always
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Long-running bulk-enrichment worker. Shares the backend image so the
  # dependency set and imports stay identical. Runs `enrichment_worker.main`
  # instead of uvicorn; the Postgres-backed queue means horizontal scaling
  # is one-flag-away (`docker compose up -d --scale enrichment-worker=N`).
  enrichment-worker:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      WORKER_CONCURRENCY: "3"
      WORKER_POLL_INTERVAL_S: "2"
      WORKER_IDLE_SLEEP_S: "15"
      ENRICHMENT_DAILY_BUDGET_USD: "10"
      DDG_MIN_INTERVAL_S: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "enrichment_worker"]
    # Worker doesn't serve HTTP — healthcheck confirms the process is
    # alive via a Python one-liner that imports the module.
    healthcheck:
      test: ["CMD", "python", "-c", "import enrichment_worker"]
      interval: 60s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
