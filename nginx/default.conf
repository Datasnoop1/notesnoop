# Resolve Docker service names at request time so deploys that recreate
# application containers do not leave nginx proxying to stale container IPs.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

# Public Person profiles use the same defence-in-depth posture as PII-heavy
# profile reads: app-level tier/IP buckets plus an nginx per-IP floor.
limit_req_zone $binary_remote_addr zone=person_profile:10m rate=60r/m;

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml font/woff2;

# Hide server version
server_tokens off;

# NOTE: security headers (X-Frame-Options, CSP, etc.) are intentionally NOT
# defined at http level. Each server block that needs them sets its own.
# Proxied server blocks (e.g. staging.datasnoop.be) deliberately let the
# upstream's headers pass through. Defining these globally would layer a
# second CSP on top of every proxied response — browsers then apply the
# intersection, which silently blocks legitimate third-party calls
# (e.g. a tool with a custom CSP for an external API).

# HTTP -> HTTPS redirect (all domains -> datasnoop.be)
server {
    listen 80;
    server_name datasnoop.be www.datasnoop.be datasnoop.eu www.datasnoop.eu datapeak.invm.be;
    return 301 https://datasnoop.be$request_uri;
}

# Fallback for IP access
server {
    listen 80 default_server;
    server_name _;
    return 301 https://datasnoop.be$request_uri;
}

# Redirect www / .eu / old domain to canonical datasnoop.be
server {
    listen 443 ssl http2;
    server_name www.datasnoop.be datasnoop.eu www.datasnoop.eu;

    ssl_certificate /etc/letsencrypt/live/datasnoop.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datasnoop.be/privkey.pem;

    return 301 https://datasnoop.be$request_uri;
}

# Old domain redirect
server {
    listen 443 ssl http2;
    server_name datapeak.invm.be;

    ssl_certificate /etc/letsencrypt/live/datapeak.invm.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datapeak.invm.be/privkey.pem;

    return 301 https://datasnoop.be$request_uri;
}

# Staging HTTPS server (proxies to staging containers on port 8080)
server {
    listen 443 ssl http2;
    server_name staging.datasnoop.be;

    ssl_certificate /etc/letsencrypt/live/staging.datasnoop.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.datasnoop.be/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Primary HTTPS server
server {
    listen 443 ssl http2;
    server_name datasnoop.be;

    set $frontend_origin http://frontend:3000;
    set $backend_origin http://backend:8000;

    ssl_certificate /etc/letsencrypt/live/datasnoop.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datasnoop.be/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers (server-level add_header overrides global headers).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://*.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://js.stripe.com https://openrouter.ai https://*.openrouter.ai; frame-src 'self' https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # Cache static assets
    location /_next/static/ {
        proxy_pass $frontend_origin;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Clean URL for standalone vote page
    location = /vote {
        rewrite ^ /vote.html last;
    }

    # --- Standalone tools served from the experimental-tools repo ---
    # Files live in their own GitHub repo, cloned to /srv/tools on the host
    # and bind-mounted into this nginx container at /var/www/tools (see the
    # nginx service in docker-compose.yml). No backend, no database, no
    # coupling to the DataSnoop frontend. Each tool gets a custom CSP
    # because the main site's strict policy blocks the third-party APIs
    # these tools need (e.g. OpenStreetMap, Google Fonts).
    location = /tools/reimbursement {
        alias /var/www/tools/travel-reimbursement.html;
        default_type text/html;
        # Defence-in-depth: refuse to follow symlinks inside the bind mount.
        # Limits damage if /srv/tools is ever populated with a malicious link.
        disable_symlinks on;

        # nginx quirk: any add_header at this level wipes out server- and http-
        # level add_header directives, so we must repeat the base security
        # headers verbatim.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org https://router.project-osrm.org; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    }

    # API -> FastAPI
    location /api/ {
        proxy_pass $backend_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Public person profile pages. The app flag still controls whether a
    # profile resolves, but nginx bounds anonymous scraping before it reaches
    # Next.js.
    location ^~ /person/ {
        limit_req zone=person_profile burst=20 nodelay;
        limit_req_status 429;

        proxy_pass $frontend_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else -> Next.js
    location / {
        proxy_pass $frontend_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
