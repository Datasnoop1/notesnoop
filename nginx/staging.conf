map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Resolve Docker service names at request time so staging deploys that recreate
# application containers do not leave nginx proxying to stale container IPs.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml font/woff2;

# Security headers (match production, but WITHOUT upgrade-insecure-requests
# because staging is plain HTTP on port 8080 — that directive would cause
# the browser to upgrade every same-origin chunk URL to https://, which
# fails with ERR_SSL_PROTOCOL_ERROR and breaks all client-side hydration).
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://*.supabase.co https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://js.stripe.com https://openrouter.ai https://*.openrouter.ai https://*.clerk.accounts.dev https://*.clerk.com https://clerk-telemetry.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://*.clerk.accounts.dev https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;

server_tokens off;

server {
    listen 80;
    server_name _;

    set $frontend_staging_origin http://frontend-staging:3000;
    set $backend_staging_origin http://backend-staging:8000;

    client_max_body_size 10M;

    # Server-level add_header overrides global headers, so repeat security headers here.
    # See note above: NO upgrade-insecure-requests on staging.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://*.supabase.co https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://js.stripe.com https://openrouter.ai https://*.openrouter.ai https://*.clerk.accounts.dev https://*.clerk.com https://clerk-telemetry.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://*.clerk.accounts.dev https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    # Staging is publicly reachable but must never be indexed by search engines.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location /_next/static/ {
        proxy_pass $frontend_staging_origin;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- Standalone tools (mirror of prod) ---
    # Files served directly from /var/www/tools (bind mount of /srv/tools on
    # the host, populated by `git clone` of the experimental-tools repo).
    location = /tools/reimbursement {
        alias /var/www/tools/travel-reimbursement.html;
        default_type text/html;
        disable_symlinks on;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://nominatim.openstreetmap.org https://router.project-osrm.org; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    }

    location /api/ {
        proxy_pass $backend_staging_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass $frontend_staging_origin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
