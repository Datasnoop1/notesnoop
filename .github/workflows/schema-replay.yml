name: Schema Replay

on:
  pull_request:
  push:
    branches:
      - master
      - docs/architecture-r25
  schedule:
    - cron: "17 3 * * *"

jobs:
  replay:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIGRATE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datasnoop_ci
      PGPASSWORD: postgres
      PROD_SCHEMA_REPLICA_URL: ${{ secrets.PROD_SCHEMA_REPLICA_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install psycopg2-binary
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Static runtime-DDL check
        run: bash scripts/check_no_runtime_ddl.sh

      - name: Migration style check
        run: python scripts/check_migration_style.py

      - name: Replay schema and migrations
        run: |
          createdb -h localhost -U postgres datasnoop_ci
          psql "$MIGRATE_DATABASE_URL" -v ON_ERROR_STOP=1 -f src/schema.sql
          python scripts/migrate.py dry-run --target=ci
          python scripts/migrate.py up --target=ci
          python scripts/migrate.py status --target=ci --json
          python scripts/check_scrub_inventory.py --database-url "$MIGRATE_DATABASE_URL"
          pg_dump --schema-only --no-owner --no-acl "$MIGRATE_DATABASE_URL" > schema-ci.sql

      - name: Optional prod-replica schema diff
        if: env.PROD_SCHEMA_REPLICA_URL != ''
        run: |
          pg_dump --schema-only --no-owner --no-acl "$PROD_SCHEMA_REPLICA_URL" > schema-prod-replica.sql
          diff -u schema-prod-replica.sql schema-ci.sql

      - name: Upload replay schema
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: schema-replay
          path: |
            schema-ci.sql
            schema-prod-replica.sql
          if-no-files-found: ignore
