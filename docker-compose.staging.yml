services:
  backend-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      # Staging is open for browsing so the operator can verify UI without
      # signing in. Admin routes remain locked at the router level via
      # `_require_admin` dependencies, independent of STAGING_MODE.
      STAGING_MODE: "false"
      # See docker-compose.yml backend service for explanation.
      PLAYWRIGHT_SCRAPER_URL: "http://playwright-scraper-staging:8000"
      # Phase 5.2 elaboration narrative — see prod compose for details.
      PHASE_5_ELABORATION_ENABLED: "true"
      PHASE_5_DRAFT_MODEL: "ollama:qwen3-coder-next"
      PHASE_5_REFINE_MODEL: "ollama:kimi-k2.6"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    # Mount the repo's scripts/ dir read-only — see prod compose for context.
    volumes:
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Bumped from 1g because EasyOCR + PyTorch + nl/fr language models
    # consume ~2 GB when loaded. Staatsblad backfill and biweekly
    # incremental OCM run from inside this container.
    mem_limit: 3g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  frontend-staging:
    build:
      context: ./frontend
      # Read Supabase build args from /opt/leadpeek/.env on the server, same
      # source of truth prod uses. Previously these were hardcoded to a
      # stale Supabase project (migrated away in commit 884b40b), which
      # left staging signing users into a project the backend no longer
      # trusted — every /api/* call returned 401.
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    environment:
      API_URL_INTERNAL: "http://backend-staging:8000"
    restart: always
    expose:
      - "3000"
    depends_on:
      backend-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Staging variant of the bulk-enrichment worker. Same code, but runs
  # against the same Postgres as prod (staging + prod share the DB —
  # see `docs/architecture.md`). Staging is where Phase 2 pilot runs
  # the 500-CBE seed; the operator approves the prod kickoff after the
  # quality gate passes.
  enrichment-worker-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      STAGING_MODE: "true"
      # The semantic worker is mostly network-bound, so higher concurrency
      # uses the 4-core VPS more effectively than a conservative default.
      ENRICHMENT_DAILY_BUDGET_USD: "50"
      # Bumped 1 → 3 → 6 → 8 → 7 on 2026-04-25. See prod compose for rationale.
      WORKER_CONCURRENCY: "7"
      WORKER_POLL_INTERVAL_S: "1"
      WORKER_IDLE_SLEEP_S: "15"
      DDG_MIN_INTERVAL_S: "12"
      DDG_MAX_INTERVAL_S: "60"
      DDG_RATELIMIT_COOLDOWN_S: "120"
      DDG_RATELIMIT_MULTIPLIER: "2.0"
      DDG_RECOVERY_STEP_S: "0.5"
      DDG_SUCCESS_STREAK_TO_RECOVER: "6"
      BULK_Q2_MODEL: "ollama:qwen3-coder-next"
      BULK_Q2_FALLBACK_MODEL: ""
      # Switched 2026-04-25 from anthropic/claude-haiku-4.5 to
      # ollama:kimi-k2.6 so escalations don't share Anthropic rate limits.
      BULK_HAIKU_MODEL: "ollama:kimi-k2.6"
      BULK_HAIKU_FALLBACK_MODEL: "anthropic/claude-haiku-4.5"
      # Staging variant points at the staging playwright-scraper service.
      PLAYWRIGHT_SCRAPER_URL: "http://playwright-scraper-staging:8000"
      # Wave 2 acceleration — see prod compose for design notes.
      DDG_VIA_WEBSHARE: "true"
      DDG_VIA_WEBSHARE_MIN_INTERVAL_S: "0.5"
      WEBSHARE_PROXIES_FILE: "/run/secrets/webshare_proxies.txt"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
    depends_on:
      backend-staging:
        condition: service_healthy
      playwright-scraper-staging:
        condition: service_healthy
    command: ["python", "-m", "enrichment_worker"]
    # See prod compose for rationale. Same DB-aware healthcheck so staging
    # exercises the same code path as production.
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck_worker.py"]
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Staging variant of the NBB historical backload worker. Staging shares
  # prod Postgres, so running this alongside the prod worker would race for
  # the same candidate CBEs and waste NBB API quota on duplicate calls.
  # Gated behind a `test-backload` compose profile so the standard staging
  # deploy (`deploy_staging.sh`) does NOT start it. To smoke-test the
  # daemon on staging, run on the server:
  #   docker compose -f docker-compose.staging.yml -p leadpeek-staging \
  #     --profile test-backload up -d nbb-backload-worker-staging
  # Then stop the prod worker briefly OR accept some duplicate-call waste
  # while the test runs. See docker-compose.yml for the full design notes.
  nbb-backload-worker-staging:
    profiles: ["test-backload"]
    build: ./backend
    restart: unless-stopped
    # See docker-compose.yml for rationale.
    stop_grace_period: 30s
    env_file: .env.production
    environment:
      # STAGING_MODE is set for parity with other staging services but is
      # NOT read by nbb_nightly_backload.py — concurrency safety relies on
      # the pg_try_advisory_lock(8888, 1) inside the script, which keeps
      # this worker idle if the prod worker is already running.
      STAGING_MODE: "true"
      PYTHONPATH: "/app"
      BACKLOAD_MAX_CALLS: "${BACKLOAD_MAX_CALLS:-1500}"
      # See docker-compose.yml for default-year rationale.
      BACKLOAD_START_YEAR: "${BACKLOAD_START_YEAR:-2024}"
      BACKLOAD_END_YEAR: "${BACKLOAD_END_YEAR:-2022}"
      BACKLOAD_PER_YEAR_CAP: "${BACKLOAD_PER_YEAR_CAP:-1500}"
      BACKLOAD_SLEEP_S: "${BACKLOAD_SLEEP_S:-30}"
      BACKLOAD_BACKOFF_S: "${BACKLOAD_BACKOFF_S:-600}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend-staging:
        condition: service_healthy
    command: ["bash", "/app/scripts/nbb_backload_loop.sh"]
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src:/app/src:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport pathlib\nneedle = 'nbb_backload_loop.sh'\nfor cmdline in pathlib.Path('/proc').glob('*/cmdline'):\n    try:\n        text = cmdline.read_text(errors='ignore').replace('\\x00', ' ')\n    except OSError:\n        continue\n    if needle in text:\n        raise SystemExit(0)\nraise SystemExit(1)\nPY",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Staging variant of the dedicated Staatsblad bulk worker. Staging still
  # shares prod Postgres, so this service remains a live-data job; the
  # benefit is operational isolation from the web backend lifecycle.
  staatsblad-bulk-worker-staging:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      PYTHONPATH: "/app"
      BULK_MAX_PAGES: "${BULK_MAX_PAGES:-5}"
      STAATSBLAD_BULK_WORKERS: "${STAATSBLAD_BULK_WORKERS:-10}"
      STAATSBLAD_BULK_PROXY_FILE: "/run/secrets/webshare_proxies.txt"
      STAATSBLAD_BULK_LOG_FILE: "/var/log/staatsblad_bulk/worker.log"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend-staging:
        condition: service_healthy
    command:
      - sh
      - -lc
      - >
        mkdir -p /var/log/staatsblad_bulk &&
        exec python -u /app/scripts/staatsblad_bulk_scrape.py
        --mode=webshare
        --daemon
        --workers=$${STAATSBLAD_BULK_WORKERS:-10}
        --webshare-proxies-file=$${STAATSBLAD_BULK_PROXY_FILE:-/run/secrets/webshare_proxies.txt}
        >> $${STAATSBLAD_BULK_LOG_FILE:-/var/log/staatsblad_bulk/worker.log} 2>&1
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src:/app/src:ro
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
      - ${STAATSBLAD_BULK_LOG_DIR:-/var/log/staatsblad_bulk}:/var/log/staatsblad_bulk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport pathlib\nneedle = 'staatsblad_bulk_scrape.py'\nfor cmdline in pathlib.Path('/proc').glob('*/cmdline'):\n    try:\n        text = cmdline.read_text(errors='ignore').replace('\\x00', ' ')\n    except OSError:\n        continue\n    if needle in text:\n        raise SystemExit(0)\nraise SystemExit(1)\nPY",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Staging variant of the playwright-scraper service. Same image, separate
  # container so a staging restart doesn't kill in-flight prod scrapes.
  # See docker-compose.yml for the full design notes.
  playwright-scraper-staging:
    build: ./playwright-scraper
    restart: always
    expose:
      - "8000"
    environment:
      WEBSHARE_PROXIES_FILE: "/run/secrets/webshare_proxies.txt"
      PLAYWRIGHT_MAX_CONCURRENT: "${PLAYWRIGHT_MAX_CONCURRENT:-2}"
      PLAYWRIGHT_DEFAULT_TIMEOUT_MS: "${PLAYWRIGHT_DEFAULT_TIMEOUT_MS:-30000}"
      PLAYWRIGHT_RECYCLE_AFTER: "${PLAYWRIGHT_RECYCLE_AFTER:-500}"
    volumes:
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health'); d=json.load(r); exit(0 if d.get('status')=='ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Lower concurrency than prod (2 vs 3) — staging shares the host with
    # prod and we don't want a runaway test to starve the live worker.
    mem_limit: 1200m
    mem_reservation: 384m
    deploy:
      resources:
        limits:
          memory: 1200M
        reservations:
          memory: 384M

  nginx-staging:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DEMO_BOX_PATH:-/srv/demo-box}:/var/www/demo-box:ro
      # experimental-tools repo, see docker-compose.yml for context.
      - ${TOOLS_PATH:-/srv/tools}:/var/www/tools:ro
    depends_on:
      - frontend-staging
      - backend-staging
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
