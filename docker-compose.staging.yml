services:
  backend-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"

  frontend-staging:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "https://nvtopretdjlxabsmqxvk.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_j5RPicDE1GnDQ8rwXKMjQw_6sCIUZWi"
    restart: always
    expose:
      - "3000"

  nginx-staging:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-staging
      - backend-staging
