services:
  backend-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend-staging:
    build:
      context: ./frontend
      # Staging keys are hardcoded here because non-interactive ssh deploys
      # don't source a shell env file. Supabase anon keys are public; the
      # internal API URL is runtime-only per SSR fix.
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "https://nvtopretdjlxabsmqxvk.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_j5RPicDE1GnDQ8rwXKMjQw_6sCIUZWi"
    environment:
      API_URL_INTERNAL: "http://backend-staging:8000"
    restart: always
    expose:
      - "3000"
    depends_on:
      backend-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  nginx-staging:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-staging
      - backend-staging
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
