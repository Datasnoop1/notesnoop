services:
  backend-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      # Staging is open for browsing so the operator can verify UI without
      # signing in. Admin routes remain locked at the router level via
      # `_require_admin` dependencies, independent of STAGING_MODE.
      STAGING_MODE: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    # Mount the repo's scripts/ dir read-only — see prod compose for context.
    volumes:
      - ./scripts:/app/scripts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Bumped from 1g because EasyOCR + PyTorch + nl/fr language models
    # consume ~2 GB when loaded. Staatsblad backfill and biweekly
    # incremental OCM run from inside this container.
    mem_limit: 3g
    mem_reservation: 1g
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  frontend-staging:
    build:
      context: ./frontend
      # Read Supabase build args from /opt/leadpeek/.env on the server, same
      # source of truth prod uses. Previously these were hardcoded to a
      # stale Supabase project (migrated away in commit 884b40b), which
      # left staging signing users into a project the backend no longer
      # trusted — every /api/* call returned 401.
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
    environment:
      API_URL_INTERNAL: "http://backend-staging:8000"
    restart: always
    expose:
      - "3000"
    depends_on:
      backend-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Staging variant of the bulk-enrichment worker. Same code, but runs
  # against the same Postgres as prod (staging + prod share the DB —
  # see `docs/architecture.md`). Staging is where Phase 2 pilot runs
  # the 500-CBE seed; the operator approves the prod kickoff after the
  # quality gate passes.
  enrichment-worker-staging:
    build: ./backend
    restart: always
    env_file: .env.production
    environment:
      STAGING_MODE: "true"
      # Staging pilot budget is small — operator can raise via admin UI.
      ENRICHMENT_DAILY_BUDGET_USD: "2"
      WORKER_CONCURRENCY: "2"
      WORKER_POLL_INTERVAL_S: "2"
      WORKER_IDLE_SLEEP_S: "15"
      DDG_MIN_INTERVAL_S: "3"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend-staging:
        condition: service_healthy
    command: ["python", "-m", "enrichment_worker"]
    healthcheck:
      test: ["CMD", "python", "-c", "import enrichment_worker"]
      interval: 60s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Staging variant of the dedicated Staatsblad bulk worker. Staging still
  # shares prod Postgres, so this service remains a live-data job; the
  # benefit is operational isolation from the web backend lifecycle.
  staatsblad-bulk-worker-staging:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      PYTHONPATH: "/app"
      STAATSBLAD_BULK_PROXY_FILE: "/run/secrets/webshare_proxies.txt"
      STAATSBLAD_BULK_LOG_FILE: "/var/log/staatsblad_bulk/worker.log"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend-staging:
        condition: service_healthy
    command:
      - sh
      - -lc
      - >
        export BULK_MAX_PAGES="$${BULK_MAX_PAGES:-5}" &&
        workers="$${STAATSBLAD_BULK_WORKERS:-10}" &&
        proxy_file="$${STAATSBLAD_BULK_PROXY_FILE:-/run/secrets/webshare_proxies.txt}" &&
        log_file="$${STAATSBLAD_BULK_LOG_FILE:-/var/log/staatsblad_bulk/worker.log}" &&
        mkdir -p /var/log/staatsblad_bulk &&
        python -u /app/scripts/staatsblad_bulk_scrape.py
        --mode=webshare
        --workers="$$workers"
        --webshare-proxies-file="$$proxy_file"
        >> "$$log_file" 2>&1
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src:/app/src:ro
      - ${WEBSHARE_PROXIES_FILE:-/root/webshare_proxies.txt}:/run/secrets/webshare_proxies.txt:ro
      - ${STAATSBLAD_BULK_LOG_DIR:-/var/log/staatsblad_bulk}:/var/log/staatsblad_bulk
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport pathlib\nneedle = 'staatsblad_bulk_scrape.py'\nfor cmdline in pathlib.Path('/proc').glob('*/cmdline'):\n    try:\n        text = cmdline.read_text(errors='ignore').replace('\\x00', ' ')\n    except OSError:\n        continue\n    if needle in text:\n        raise SystemExit(0)\nraise SystemExit(1)\nPY",
        ]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s
    mem_limit: 1g
    mem_reservation: 256m
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  nginx-staging:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend-staging
      - backend-staging
    mem_limit: 512m
    mem_reservation: 128m
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
